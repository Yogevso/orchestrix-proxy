# ===========================================================================
#  Orchestrix Platform Gateway Config
#
#  Load-balances traffic across the real Orchestrix services:
#    engine   → Orchestrix Engine   (task orchestration API)
#    insights → System Insights API (telemetry + analytics)
#    iam      → Identity Access Svc (auth + RBAC)
#
#  Note: The proxy round-robins across all three (no path-based routing).
#  Used by docker-compose.orchestrix.yml
# ===========================================================================

[proxy]
listen_port              = 8080
admin_port               = 8081
worker_count             = 8
queue_capacity           = 64
upstream_connect_timeout_ms = 3000
upstream_read_timeout_ms = 10000
max_request_body_bytes   = 10485760
log_format               = jsonl
mode                     = proxy

[upstreams]
engine   = engine:8000
insights = insights:8000
iam      = iam:8000

[loadbalancer]
strategy = round_robin

[healthcheck]
enabled      = true
interval_sec = 5
timeout_ms   = 2000
path         = /health

[ratelimit]
enabled          = true
per_ip_per_minute = 300

[circuitbreaker]
enabled           = true
failure_threshold = 5
cooldown_sec      = 15

[priority]
enabled  = true
prefix1  = /iam/api/v1/auth      ; auth endpoints are high-priority
prefix2  = /engine/api/tasks     ; task dispatch is high-priority

[chaos]
enabled          = false
inject_delay_ms  = 0
drop_rate        = 0.0
