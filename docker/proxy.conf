# Docker Compose config — backends use container DNS names.
# This file is volume-mounted into the proxy container.

[proxy]
listen_port              = 8080
admin_port               = 8081
worker_count             = 4
queue_capacity           = 16
upstream_connect_timeout_ms = 2000
upstream_read_timeout_ms = 5000
max_request_body_bytes   = 10485760
log_format               = clf
mode                     = proxy

[upstreams]
backend1 = backend1:9001
backend2 = backend2:9002
backend3 = backend3:9003

[loadbalancer]
strategy = round_robin

[healthcheck]
enabled      = true
interval_sec = 5
timeout_ms   = 2000
path         = /health

[ratelimit]
enabled          = true
per_ip_per_minute = 120

[circuitbreaker]
enabled           = true
failure_threshold = 5
cooldown_sec      = 30

[priority]
enabled  = false

[chaos]
enabled          = false
inject_delay_ms  = 0
drop_rate        = 0.0
