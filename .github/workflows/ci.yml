name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Build (AddressSanitizer)
        run: make asan

      - name: Build (ThreadSanitizer)
        run: make tsan

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Build + Smoke Test
        run: docker build -t orchestrix-proxy .
