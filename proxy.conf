# ===========================================================================
#  Orchestrix Proxy — Configuration File
# ===========================================================================
#
#  Usage:   ./proxy proxy.conf
#  Syntax:  INI-style.  Lines starting with # or ; are comments.
#

[proxy]
listen_port              = 8080
admin_port               = 8081
worker_count             = 4
queue_capacity           = 16
upstream_connect_timeout_ms = 2000
upstream_read_timeout_ms = 5000
max_request_body_bytes   = 10485760   ; 10 MB
log_format               = clf        ; clf | jsonl
mode                     = proxy      ; proxy | static

[upstreams]
backend1 = 127.0.0.1:9001
backend2 = 127.0.0.1:9002
backend3 = 127.0.0.1:9003

[loadbalancer]
strategy = round_robin    ; round_robin | least_connections

[healthcheck]
enabled      = true
interval_sec = 5
timeout_ms   = 2000
path         = /health

[ratelimit]
enabled          = true
per_ip_per_minute = 120

[circuitbreaker]
enabled           = true
failure_threshold = 5
cooldown_sec      = 30

[priority]
enabled  = false
; prefix1 = /api/checkout
; prefix2 = /api/payments

[chaos]
enabled          = false
inject_delay_ms  = 0
drop_rate        = 0.0
